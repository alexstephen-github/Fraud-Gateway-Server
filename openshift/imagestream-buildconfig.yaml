apiVersion: image.openshift.io/v1
kind: ImageStream
metadata:
  name: fraud-gateway-server
  labels:
    app: fraud-gateway-server
spec:
  lookupPolicy:
    local: true
---
apiVersion: build.openshift.io/v1
kind: BuildConfig
metadata:
  name: fraud-gateway-server
  labels:
    app: fraud-gateway-server
spec:
  output:
    to:
      kind: ImageStreamTag
      name: fraud-gateway-server:latest
  # Docker strategy builds using the Dockerfile at the root of the source.
  strategy:
    type: Docker
    dockerStrategy:
      dockerfilePath: Dockerfile
  source:
    type: Git
    git:
      # Replace with your repository URL and branch.
      uri: https://github.com/your-org/fraud-gateway-server.git
      ref: main
  triggers:
    - type: ConfigChange
    - type: ImageChange
